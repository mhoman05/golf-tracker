function hcpTier(hcp) {
  if (hcp <= 4)  return "scratch";
  if (hcp <= 12) return "low";
  if (hcp <= 20) return "mid";
  if (hcp <= 28) return "high";
  return "vhigh";
}

function lieKey(lie) {
  const l = (lie || "").toLowerCase();
  if (l === "green")                        return "green";
  if (l === "bunker")                       return "bunker";
  if (l === "fringe")                       return "fringe";
  if (l === "rough" || l === "semi-rough")  return "rough";
  if (l === "drop/penalty")                 return "drop";
  return "fairway";
}

function interpTable(table, d) {
  if (!d || d <= 0) return 1;
  const dist = Math.max(0, d);
  for (let i = 0; i < table.length - 1; i++) {
    const [d0,s0] = table[i], [d1,s1] = table[i+1];
    if (dist >= d0 && dist <= d1) return s0 + (dist-d0)/(d1-d0)*(s1-s0);
  }
  const [dL,sL] = table[table.length-2], [dM,sM] = table[table.length-1];
  return sM + ((sM-sL)/(dM-dL)) * (dist-dM);
}

function expStrokes(dist, lie, tier) {
  const tables = EXP_STROKES[tier] || EXP_STROKES.mid;
  return interpTable(tables[lieKey(lie)] || tables.fairway, dist);
}

function shotCat(shot, idx, par) {
  const lie = (shot.lie || "").toLowerCase();
  const d   = shot.distance || 0;
  if (lie === "green")                       return "putting";
  if (d <= 30 && lie !== "tee")             return "atg";
  if (idx === 0 && (par === 4 || par === 5)) return "driving";
  return "approach";
}

function calcHoleSG(shots, par, tier) {
  if (!shots || shots.length < 2) return { total:0, driving:0, approach:0, atg:0, putting:0, perShot:[] };
  const perShot = shots.map((s, i) => {
    if (!s.distance) return { sg:0, cat:shotCat(s,i,par) };
    const before = expStrokes(s.distance, s.lie, tier);
    const after  = i < shots.length-1 ? expStrokes(shots[i+1].distance, shots[i+1].lie, tier) : 0;
    return { sg: parseFloat((before - after - 1).toFixed(3)), cat: shotCat(s,i,par) };
  });
  const sum = cat => perShot.filter(p=>p.cat===cat).reduce((a,p)=>a+p.sg,0);
  return {
    total:    +perShot.reduce((a,p)=>a+p.sg,0).toFixed(2),
    driving:  +sum("driving").toFixed(2),
    approach: +sum("approach").toFixed(2),
    atg:      +sum("atg").toFixed(2),
    putting:  +sum("putting").toFixed(2),
    perShot
  };
}

// ─── ANALYTICS ───────────────────────────────────────────────────────────────
function analyzeRound(round) {
  const tier = hcpTier(round.handicap || 18);
  let sg = {total:0,driving:0,approach:0,atg:0,putting:0};
  let gir=0, fir=0, firHoles=0, putts=0, girHoles=0;
  let puttDists=[], parCounts={3:[],4:[],5:[]};
  let scoreDist={eagle:0,birdie:0,par:0,bogey:0,double:0};

  round.holes.forEach(h => {
    const par=h.par||4, shots=h.shots||[], score=shots.length;
    if (!score) return;
    const diff=score-par;
    if (diff<=-2) scoreDist.eagle++; else if(diff===-1) scoreDist.birdie++;
    else if(diff===0) scoreDist.par++; else if(diff===1) scoreDist.bogey++;
    else scoreDist.double++;
    if (parCounts[par]) parCounts[par].push(score);

    // GIR
    girHoles++;
    const regIdx = par-2;
    if ((shots[regIdx]&&shots[regIdx].lie==="Green")||shots.slice(0,regIdx+1).some(function(s){return s.lie==="Green";})) gir++;

    // FIR
    if (par>=4) { firHoles++; if(shots.length>1&&shots[1].lie==="Fairway") fir++; }

    // Putts
    const hPutts = shots.filter(s=>s.lie==="Green").length;
    putts += hPutts;
    const fp = shots.find(s=>s.lie==="Green");
    if (fp&&fp.distance) puttDists.push({dist:fp.distance, made:hPutts===1});

    const hSG = calcHoleSG(shots, par, tier);
    sg.total+=hSG.total; sg.driving+=hSG.driving;
    sg.approach+=hSG.approach; sg.atg+=hSG.atg; sg.putting+=hSG.putting;
  });

  const holesPlayed = round.holes.filter(h=>h.shots.length>0).length;
  const totalScore  = round.holes.reduce((s,h)=>s+h.shots.length,0);
  const totalPar    = round.holes.reduce((s,h)=>s+(h.par||4),0);
  return {
    sg:{total:+sg.total.toFixed(1),driving:+sg.driving.toFixed(1),approach:+sg.approach.toFixed(1),atg:+sg.atg.toFixed(1),putting:+sg.putting.toFixed(1)},
    gir: girHoles>0?Math.round(gir/girHoles*100):0,
    fir: firHoles>0?Math.round(fir/firHoles*100):0,
    girCount:gir, girHoles, firCount:fir, firHoles,
    putts, holesPlayed,
    puttsPerHole: holesPlayed?+(putts/holesPlayed).toFixed(2):0,
    puttsPerGIR:  gir?+(putts/gir).toFixed(2):0,
    puttDists, parCounts, scoreDist,
    totalScore, totalPar, diff:totalScore-totalPar
  };
}

function aggregateAll(rounds) {
  if (!rounds.length) return null;
  const all = rounds.map(analyzeRound);
  const avg  = fn => +(all.reduce((s,r)=>s+fn(r),0)/all.length).toFixed(1);
  const avgI = fn => Math.round(all.reduce((s,r)=>s+fn(r),0)/all.length);

  const allPuttDists = all.flatMap(r=>r.puttDists);
  const puttBuckets = [
    {label:"<1m",  min:0,  max:1,   bench:{scratch:99,low:99,mid:98,high:96,vhigh:93}},
    {label:"1-2m", min:1,  max:2,   bench:{scratch:93,low:88,mid:82,high:73,vhigh:62}},
    {label:"2-3m", min:2,  max:3,   bench:{scratch:78,low:70,mid:61,high:51,vhigh:40}},
    {label:"3-5m", min:3,  max:5,   bench:{scratch:58,low:48,mid:39,high:30,vhigh:22}},
    {label:"5-8m", min:5,  max:8,   bench:{scratch:38,low:29,mid:22,high:16,vhigh:11}},
    {label:"8-12m",min:8,  max:12,  bench:{scratch:24,low:17,mid:12,high:8, vhigh:5}},
    {label:">12m", min:12, max:999, bench:{scratch:14,low:9, mid:6, high:4, vhigh:2}},
  ].map(b => {
    const rel  = allPuttDists.filter(p=>p.dist>=b.min&&p.dist<b.max);
    const made = rel.filter(p=>p.made).length;
    // Use dominant tier from rounds
    const tiers = rounds.map(r=>hcpTier(r.handicap||18));
    const dominant = tiers.sort((a,z)=>tiers.filter(v=>v===z).length-tiers.filter(v=>v===a).length)[0]||"mid";
    return {...b, attempts:rel.length, made, pct:rel.length?Math.round(made/rel.length*100):null, benchPct:b.bench[dominant]};
  });

  const parAverages={};
  [3,4,5].forEach(p=>{
    const sc=all.flatMap(r=>r.parCounts[p]||[]);
    parAverages[p]=sc.length?+(sc.reduce((s,v)=>s+v,0)/sc.length).toFixed(2):null;
  });
  const sdTotals={eagle:0,birdie:0,par:0,bogey:0,double:0};
  all.forEach(r=>Object.keys(sdTotals).forEach(k=>{sdTotals[k]+=r.scoreDist[k]||0;}));
  const totalHoles=all.reduce((s,r)=>s+r.holesPlayed,0);

  return {
    rounds:all.length,
    sg:{total:avg(r=>r.sg.total),driving:avg(r=>r.sg.driving),approach:avg(r=>r.sg.approach),atg:avg(r=>r.sg.atg),putting:avg(r=>r.sg.putting)},
    gir:avgI(r=>r.gir), fir:avgI(r=>r.fir),
    puttsPerHole:avg(r=>r.puttsPerHole), puttsPerGIR:avg(r=>r.puttsPerGIR),
    puttBuckets, parAverages, sdTotals, totalHoles,
    scoreDist:{
      eagle: totalHoles?+(sdTotals.eagle /totalHoles*100).toFixed(1):0,
      birdie:totalHoles?+(sdTotals.birdie/totalHoles*100).toFixed(1):0,
      par:   totalHoles?+(sdTotals.par   /totalHoles*100).toFixed(1):0,
      bogey: totalHoles?+(sdTotals.bogey /totalHoles*100).toFixed(1):0,
      double:totalHoles?+(sdTotals.double/totalHoles*100).toFixed(1):0,
    }
  };
}

    });
  },[]);

  const saveRounds  = async (r) => { setRounds(r);  await store.set(STORAGE_ROUNDS,r); };
  const saveCourses = async (c) => { setCourses(c); await store.set(STORAGE_COURSES,c); };

  const exportData = () => {
    const payload = JSON.stringify({rounds, courses, exportedAt: new Date().toISOString(), version:1}, null, 2);
    const blob = new Blob([payload], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dateStr = new Date().toISOString().split("T")[0];
    a.href=url; a.download="golf-backup-"+dateStr+".json"; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.rounds || !Array.isArray(data.rounds)) { alert("Invalid backup file."); return; }
        const merged = [...data.rounds];
        // Merge: add imported rounds not already present (match by date+course)
        rounds.forEach(r => {
          const exists = merged.some(m => m.date===r.date && m.courseName===r.courseName);
          if (!exists) merged.push(r);
        });
        merged.sort((a,b) => new Date(b.date)-new Date(a.date));
        await saveRounds(merged);
        if (data.courses) await saveCourses(data.courses);
        setShowDataMenu(false);
        alert("Import successful! "+merged.length+" rounds loaded.");
      } catch(err) { alert("Failed to read file: "+err.message); }
    };
    reader.readAsText(file);
  };

  const startRound = async (meta) => {
    // meta: {courseName, teeBox, weather[], handicap, holePars[18 or 9]}
    const holeArr = Array.from({length:meta.holePars.length},(_,i)=>({hole:i+1, par:meta.holePars[i]||4, shots:[]}));

    await saveCourses(updated.slice(0,20));

    const par=(activeRound.holes[idx]&&activeRound.holes[idx].par)||4;
    setCurPar(par);
    if (activeRound.holes[idx]&&activeRound.holes[idx].shots.length===0) { setShotLie("Tee"); setShotClub("Driver"); setShotDist(""); }
    else setShotDist("");
  };
  const nextHole=()=>{ if(curHole<activeRound.total-1) goHole(curHole+1); };
  const prevHole=()=>{ if(curHole>0) goHole(curHole-1); };

  const tryFinish=(holesLeft)=>{
    if (holesLeft>0) setConfirmFinish(true);
    else doFinish();
  };
  const doFinish=async()=>{
    const finished={...activeRound, finished:true};
    const newRounds=[finished,...rounds];
    await saveRounds(newRounds);
    setScorecardRound(finished); setActiveRound(null); setConfirmFinish(false); setView("scorecard");
  };

  const deleteRound=async(idx)=>{ await saveRounds(rounds.filter((_,i)=>i!==idx)); };

  // ── scorecard edit helpers ───────────────────────────────────────────────
  const updateEditRoundHole=(hIdx,par)=>{
    setRounds(prev=>{
      const copy=prev.map((r,ri)=>ri===editRoundIdx?{...r,holes:r.holes.map((h,hi)=>hi===hIdx?{...h,par}:h)}:r);
      store.set(STORAGE_ROUNDS,copy); return copy;
    });
  };
  const deleteEditShot=(hIdx,sIdx)=>{
    setRounds(prev=>{
      const copy=prev.map((r,ri)=>ri===editRoundIdx?{...r,holes:r.holes.map((h,hi)=>hi===hIdx?{...h,shots:h.shots.filter((_,si)=>si!==sIdx)}:h)}:r);
      store.set(STORAGE_ROUNDS,copy); return copy;
    });
  };
  const addEditShot=(hIdx,shot)=>{
    setRounds(prev=>{
      const copy=prev.map((r,ri)=>ri===editRoundIdx?{...r,holes:r.holes.map((h,hi)=>hi===hIdx?{...h,shots:[...h.shots,shot]}:h)}:r);
      store.set(STORAGE_ROUNDS,copy); return copy;
    });
  };

  const currentShots=(activeRound&&activeRound.holes&&activeRound.holes[curHole]&&activeRound.holes[curHole].shots)||[];
  const holeScore=currentShots.length;
  const scoreDiff=holeScore-curPar;
  const holesRemaining=activeRound?activeRound.holes.filter((h,i)=>i>curHole&&h.shots.length===0).length:0;

  if (!loaded) return <Loader/>;

  // ── HOME ──────────────────────────────────────────────────────────────────
  if (view==="home") return (
    <Screen>
      <div style={{padding:"8px 20px 0",display:"flex",justifyContent:"flex-end"}}>
        <button onClick={()=>setShowDataMenu(true)} style={{...ghost,borderRadius:8,padding:"6px 12px",fontSize:11,display:"flex",alignItems:"center",gap:4}}>
          &#128190; Backup / Restore
        </button>
      </div>

      {showDataMenu&&(
        <div style={{position:"fixed",inset:0,background:"#000b",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#0c1a12",border:"1px solid #1a2a1f",borderRadius:20,padding:28,maxWidth:320,width:"100%"}}>
            <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:18,color:"#f0ebe0",marginBottom:6}}>Backup &amp; Restore</div>
            <div style={{fontSize:12,color:"#3a5042",marginBottom:20,lineHeight:1.5}}>
              Export saves all your rounds to a JSON file. Import merges rounds from a backup without overwriting existing data.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={exportData} style={{background:"#1a3a28",color:"#5abf80",border:"1px solid #2d6a4a",borderRadius:12,padding:"13px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                &#8595; Export rounds to JSON
              </button>
              <label style={{background:"#1a2a3a",color:"#5a9abf",border:"1px solid #2d4a6a",borderRadius:12,padding:"13px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",textAlign:"center",display:"block"}}>
                &#8593; Import from JSON backup
                <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
              </label>
              <button onClick={()=>setShowDataMenu(false)} style={{...ghost,borderRadius:12,padding:"11px",fontWeight:700,fontSize:13}}>Cancel</button>
            </div>
            {rounds.length>0&&<div style={{marginTop:14,fontSize:10,color:"#2a4030",textAlign:"center"}}>{rounds.length} round{rounds.length!==1?"s":""} currently saved</div>}
          </div>
        </div>
      )}

      <AppHeader/>
      <div style={{padding:"16px 20px 110px",flex:1,overflow:"auto",display:"flex",flexDirection:"column",gap:14}}>
        <Card>
          <SL>New Round</SL>
          <NewRoundForm courses={courses} onStart={startRound}/>
        </Card>
        {rounds.length>0&&<Card><SL>Last Round</SL><RoundRow round={rounds[0]} onClick={()=>{setStatsRound(rounds[0]);setView("stats");}}/></Card>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <ActionTile icon="📊" label="Statistics" sub="Strokes Gained" onClick={()=>{setStatsRound(null);setView("stats");}}/>
          <ActionTile icon="📋" label="History"    sub={rounds.length+" rounds"} onClick={()=>setView("history")}/>
        </div>
      </div>
      <BottomNav view={view} setView={setView} setStatsRound={setStatsRound}/>
    </Screen>
  );

  // ── ROUND ─────────────────────────────────────────────────────────────────
  if (view==="round"&&activeRound) {
    const totalShots=activeRound.holes.reduce((s,h)=>s+h.shots.length,0);
    const holesLeft=activeRound.holes.filter((h,i)=>i>curHole).length;

    return (
      <Screen>
        {/* Confirm finish dialog */}
        {confirmFinish&&(
          <div style={{position:"fixed",inset:0,background:"#000a",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
            <div style={{background:"#0c1a12",border:"1px solid #1a2a1f",borderRadius:20,padding:28,maxWidth:320,width:"100%"}}>
              <div style={{fontSize:28,textAlign:"center",marginBottom:8}}>⚠️</div>
              <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:18,color:"#f0ebe0",textAlign:"center",marginBottom:8}}>Finish Round Early?</div>
              <div style={{fontSize:13,color:"#4a6a52",textAlign:"center",marginBottom:24,lineHeight:1.5}}>
                You still have {holesRemaining} hole{holesRemaining===1?"":"s"} remaining. Are you sure you want to finish?
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setConfirmFinish(false)} style={{flex:1,...ghost,borderRadius:12,padding:"11px",fontWeight:700}}>Cancel</button>
                <button onClick={doFinish} style={{flex:1,background:"#c8a84a",color:"#0c0a06",border:"none",borderRadius:12,padding:"11px",fontWeight:800,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Finish Round</button>
              </div>
            </div>
          </div>
        )}

        {/* Header */}
        <div style={{background:"#0c1a12",borderBottom:"1px solid #1a2a1f",padding:"12px 18px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:"#3a5042",letterSpacing:2,textTransform:"uppercase"}}>{activeRound.courseName} · {activeRound.teeBox} tee</div>
            <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:20,color:"#f0ebe0"}}>
              Hole {curHole+1} <span style={{fontSize:13,color:"#3a5042"}}>/ {activeRound.total}</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#3a5042"}}>Total</div>
            <div style={{fontSize:24,color:"#c8a84a",fontWeight:800}}>{totalShots}</div>
          </div>
        </div>

        {/* Hole dots */}
        <div style={{padding:"7px 16px",display:"flex",gap:3,flexWrap:"wrap",background:"#0a1410",borderBottom:"1px solid #1a2a1f"}}>
          {activeRound.holes.map((h,i)=>{
            const sc=h.shots.length,d=sc-h.par;
            const bg=sc===0?"#0e1c13":d<=-2?"#5c4a00":d===-1?"#1a5c3a":d===0?"#152a1e":d===1?"#4a3800":"#5c1a1a";
            return <div key={i} onClick={()=>goHole(i)} style={{width:26,height:26,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,cursor:"pointer",background:bg,color:sc===0?"#2a4030":"#f0ebe0",border:i===curHole?"2px solid #5abf80":"2px solid transparent",transition:"all .1s"}}>{i+1}</div>;
          })}
        </div>

        <div style={{flex:1,overflow:"auto",padding:"12px 18px 16px"}}>
          {/* Par + live score */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:11,color:"#3a5042",marginRight:2}}>Par</span>
            {[3,4,5].map(p=>(
              <button key={p} onClick={()=>setCurPar(p)} style={{padding:"6px 14px",borderRadius:99,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",transition:"all .1s",background:curPar===p?"#1a5c3a":"#0e1c13",color:curPar===p?"#f0ebe0":"#3a5042",boxShadow:curPar===p?"0 2px 10px #1a5c3a66":"none"}}>Par {p}</button>
            ))}
            {holeScore>0&&<div style={{marginLeft:"auto",fontSize:17,fontWeight:800,color:scoreDiff<0?"#5abf80":scoreDiff===0?"#a0b8a8":scoreDiff===1?"#c8a84a":"#e05050"}}>{scoreDiff===0?"E":scoreDiff>0?"+"+scoreDiff:scoreDiff}</div>}
          </div>

          {/* Shot list */}
          {currentShots.length>0&&(
            <div style={{marginBottom:14}}>
              <SL>Shots this hole</SL>
              {currentShots.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"#0c1a12",borderRadius:10,marginBottom:6,border:"1px solid #1a2a1f"}}>
                  <span style={{fontSize:18,minWidth:24}}>{LIE_IC[s.lie]||"⚪"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#e8e2d0"}}>{s.club}<span style={{color:"#3a5042",fontWeight:400}}> · {s.lie}</span></div>
                    {s.distance&&<div style={{fontSize:11,color:"#2a4030"}}>{s.distance}m to hole</div>}
                  </div>
                  <span style={{fontSize:10,color:"#2a4030"}}>#{i+1}</span>
                  <button onClick={()=>deleteShot(curHole,i)} style={{background:"none",border:"none",color:"#7a2a2a",cursor:"pointer",fontSize:18,padding:"0 2px"}}>×</button>
                </div>
              ))}
            </div>
          )}

          {/* Add shot */}
          <Card>
            <SL>Shot #{currentShots.length+1}</SL>
            <div style={{marginBottom:12}}>
              <FL>Distance to hole (metres)</FL>
              <input value={shotDist} onChange={e=>setShotDist(e.target.value)} type="number" placeholder="e.g. 150"
                style={{width:"100%",background:"#0a1410",border:"1px solid #1a2a1f",borderRadius:10,padding:"11px 14px",color:"#f0ebe0",fontSize:16,fontFamily:"inherit",boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <FL>Ball position</FL>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {LIES.map(l=><TB key={l} label={LIE_IC[l]+" "+l} active={shotLie===l} onClick={()=>setShotLie(l)}/>)}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <FL>Club</FL>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {CLUBS.map(c=><TB key={c} label={c} active={shotClub===c} onClick={()=>setShotClub(c)}/>)}
              </div>
            </div>
            <GreenBtn onClick={addShot}>+ Add Shot</GreenBtn>
          </Card>
        </div>

        {/* Bottom nav */}
        <div style={{borderTop:"1px solid #1a2a1f",padding:"10px 18px",background:"#0a1410",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:8}}>
            {curHole>0&&<button onClick={prevHole} style={{flex:1,...ghost,borderRadius:12,padding:"11px"}}>← H{curHole}</button>}
            {curHole<activeRound.total-1
              ?<GreenBtn onClick={nextHole} style={{flex:2}}>Next Hole →</GreenBtn>
              :<button onClick={()=>tryFinish(0)} style={{flex:2,background:"#c8a84a",color:"#0c0a06",border:"none",borderRadius:12,padding:"12px",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>⛳ Finish Round</button>
            }
          </div>
          {curHole<activeRound.total-1&&(
            <button onClick={()=>tryFinish(holesLeft)} style={{...ghost,borderRadius:12,padding:"9px",width:"100%",textAlign:"center",fontSize:13,color:"#c8a84a",borderColor:"#4a3800"}}>
              ⛳ Finish Round Early
            </button>
          )}
        </div>
      </Screen>
    );
  }


  // ── SCORECARD ──────────────────────────────────────────────────────────────
  if (view==="scorecard"&&scorecardRound) {
    const sc = analyzeRound(scorecardRound);
    const holes = scorecardRound.holes;
    const front = holes.slice(0,9);
    const back  = holes.length>9?holes.slice(9):[];
    const frontScore = front.reduce(function(s,h){return s+h.shots.length;},0);
    const backScore  = back.reduce(function(s,h){return s+h.shots.length;},0);
    const frontPar   = front.reduce(function(s,h){return s+(h.par||4);},0);
    const backPar    = back.reduce(function(s,h){return s+(h.par||4);},0);

    function ScoreCell(props) {
      var h = props.h;
      if (!h||!h.shots.length) return React.createElement('td',{style:{padding:"4px 2px",textAlign:"center",fontSize:14,color:"#3a5042"}},"-");
      var score=h.shots.length, par=h.par||4, diff=score-par;
      var inner = React.createElement('span',{style:{
        display:"inline-flex",alignItems:"center",justifyContent:"center",
        width:24,height:24,fontSize:13,fontWeight:800,
        color: diff<=-2?"#c8a84a":diff===-1?"#5abf80":diff===0?"#e8e2d0":diff===1?"#e8e2d0":"#e05050"
      }}, score);
      // Eagle or better: double circle
      if (diff<=-2) return React.createElement('td',{style:{padding:"4px 2px",textAlign:"center"}},
        React.createElement('span',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",
          width:26,height:26,borderRadius:"50%",border:"2px solid #c8a84a",
          outline:"2px solid #c8a84a",outlineOffset:"2px",
          fontSize:13,fontWeight:800,color:"#c8a84a"}},score));
      // Birdie: circle
      if (diff===-1) return React.createElement('td',{style:{padding:"4px 2px",textAlign:"center"}},
        React.createElement('span',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",
          width:26,height:26,borderRadius:"50%",border:"2px solid #5abf80",
          fontSize:13,fontWeight:800,color:"#5abf80"}},score));
      // Par: plain
      if (diff===0) return React.createElement('td',{style:{padding:"4px 2px",textAlign:"center",fontSize:13,fontWeight:700,color:"#a0b8a8"}},score);
      // Bogey: square
      if (diff===1) return React.createElement('td',{style:{padding:"4px 2px",textAlign:"center"}},
        React.createElement('span',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",
          width:26,height:26,border:"2px solid #c8a84a",borderRadius:3,
          fontSize:13,fontWeight:800,color:"#c8a84a"}},score));
      // Double+: double square
      return React.createElement('td',{style:{padding:"4px 2px",textAlign:"center"}},
        React.createElement('span',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",
          width:26,height:26,border:"2px solid #e05050",borderRadius:3,
          outline:"2px solid #e05050",outlineOffset:"2px",
          fontSize:13,fontWeight:800,color:"#e05050"}},score));
    }

    function ScorecardTable(props) {
      var hs = props.holes, startNum = props.startNum||1, label = props.label;
      var parRow = hs.reduce(function(s,h){return s+(h.par||4);},0);
      var scoreRow = hs.reduce(function(s,h){return s+h.shots.length;},0);
      return React.createElement('div',{style:{marginBottom:16}},
        React.createElement('div',{style:{fontSize:9,color:"#3a5042",letterSpacing:2,textTransform:"uppercase",marginBottom:6,fontWeight:700}},label),
        React.createElement('div',{style:{overflowX:"auto"}},
          React.createElement('table',{style:{borderCollapse:"collapse",width:"100%",minWidth:320}},
            React.createElement('thead',null,
              React.createElement('tr',null,
                React.createElement('th',{style:{padding:"4px 6px",fontSize:10,color:"#3a5042",textAlign:"left",fontWeight:700}},"HOLE"),
                hs.map(function(h,i){return React.createElement('th',{key:i,style:{padding:"4px 2px",fontSize:10,color:"#3a5042",textAlign:"center",fontWeight:700,minWidth:28}},h.hole||startNum+i);}),
                React.createElement('th',{style:{padding:"4px 6px",fontSize:10,color:"#3a5042",textAlign:"center",fontWeight:700}},"TOT")
              )
            ),
            React.createElement('tbody',null,
              React.createElement('tr',{style:{borderBottom:"1px solid #1a2a1f"}},
                React.createElement('td',{style:{padding:"4px 6px",fontSize:11,color:"#4a6a52",fontWeight:600}},"PAR"),
                hs.map(function(h,i){return React.createElement('td',{key:i,style:{padding:"4px 2px",textAlign:"center",fontSize:12,color:"#4a6a52",fontWeight:600}},h.par||4);}),
                React.createElement('td',{style:{padding:"4px 6px",textAlign:"center",fontSize:12,color:"#4a6a52",fontWeight:700}},parRow)
              ),
              React.createElement('tr',null,
                React.createElement('td',{style:{padding:"4px 6px",fontSize:11,color:"#c8c0a8",fontWeight:600}},"SCORE"),
                hs.map(function(h,i){return React.createElement(ScoreCell,{key:i,h:h});}),
                React.createElement('td',{style:{padding:"4px 6px",textAlign:"center",fontSize:14,fontWeight:800,
                  color:scoreRow-parRow<0?"#5abf80":scoreRow-parRow===0?"#a0b8a8":scoreRow-parRow<4?"#c8a84a":"#e05050"}},
                  scoreRow||"-")
              )
            )
          )
        )
      );
    }

    return (
      <Screen>
        <div style={{background:"#0c1a12",borderBottom:"1px solid #1a2a1f",padding:"14px 18px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:20,color:"#f0ebe0"}}>{scorecardRound.courseName}</div>
            <div style={{fontSize:11,color:"#3a5042"}}>{scorecardRound.roundDate||scorecardRound.date&&scorecardRound.date.split("T")[0]||""}{scorecardRound.teeBox&&(" · "+scorecardRound.teeBox+" tee")}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#3a5042"}}>vs PAR</div>
            <div style={{fontSize:22,fontWeight:800,color:sc.diff<0?"#5abf80":sc.diff===0?"#a0b8a8":sc.diff<5?"#c8a84a":"#e05050"}}>{sc.diff===0?"E":sc.diff>0?"+"+sc.diff:sc.diff}</div>
          </div>
        </div>

        <div style={{flex:1,overflow:"auto",padding:"16px 18px 110px"}}>
          {/* Legend */}
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            {[
              {label:"Eagle",el:<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:"50%",border:"2px solid #c8a84a",outline:"2px solid #c8a84a",outlineOffset:"2px",fontSize:11,color:"#c8a84a"}}>3</span>},
              {label:"Birdie",el:<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:"50%",border:"2px solid #5abf80",fontSize:11,color:"#5abf80"}}>4</span>},
              {label:"Par",el:<span style={{fontSize:11,color:"#a0b8a8",fontWeight:700}}>4</span>},
              {label:"Bogey",el:<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,border:"2px solid #c8a84a",borderRadius:3,fontSize:11,color:"#c8a84a"}}>5</span>},
              {label:"Dbl+",el:<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,border:"2px solid #e05050",borderRadius:3,outline:"2px solid #e05050",outlineOffset:"2px",fontSize:11,color:"#e05050"}}>6</span>},
            ].map(function(item){return (
              <div key={item.label} style={{display:"flex",alignItems:"center",gap:5}}>
                {item.el}
                <span style={{fontSize:10,color:"#3a5042"}}>{item.label}</span>
              </div>
            );})}
          </div>

          {/* Scorecard tables */}
          <ScorecardTable holes={front} label={holes.length>9?"Front 9":"Scorecard"} startNum={1}/>
          {back.length>0&&<ScorecardTable holes={back} label="Back 9" startNum={10}/>}

          {/* Summary stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {[
              {l:"Score",v:sc.totalScore,s:"Par "+sc.totalPar},
              {l:"GIR",v:sc.gir+"%"},
              {l:"FIR",v:sc.fir+"%"},
              {l:"Putts",v:sc.putts},
            ].map(function(m){return (
              <div key={m.l} style={{background:"#0c1a12",borderRadius:10,padding:"10px 6px",textAlign:"center",border:"1px solid #1a2a1f"}}>
                <div style={{fontSize:8,color:"#3a5042",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{m.l}</div>
                <div style={{fontSize:18,fontWeight:800,color:"#f0ebe0"}}>{m.v}</div>
                {m.s&&<div style={{fontSize:8,color:"#2a4030"}}>{m.s}</div>}
              </div>
            );})}
          </div>

          {/* Score distribution */}
          <div style={{background:"#0c1a12",borderRadius:14,padding:"14px",border:"1px solid #1a2a1f",marginBottom:14}}>
            <div style={{fontSize:9,color:"#2a4030",textTransform:"uppercase",letterSpacing:2,fontWeight:700,marginBottom:10}}>Score Distribution</div>
            <div style={{display:"flex",gap:8,justifyContent:"space-around"}}>
              {[
                {l:"Eagle+",v:sc.scoreDist.eagle,col:"#c8a84a"},
                {l:"Birdie",v:sc.scoreDist.birdie,col:"#5abf80"},
                {l:"Par",   v:sc.scoreDist.par,   col:"#a0b8a8"},
                {l:"Bogey", v:sc.scoreDist.bogey, col:"#c8a84a"},
                {l:"Dbl+",  v:sc.scoreDist.double,col:"#e05050"},
              ].map(function(item){return (
                <div key={item.l} style={{textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:item.col}}>{item.v}</div>
                  <div style={{fontSize:9,color:"#3a5042"}}>{item.l}</div>
                </div>
              );})}
            </div>
          </div>
        </div>

        <div style={{borderTop:"1px solid #1a2a1f",padding:"12px 18px",background:"#0a1410",display:"flex",gap:10}}>
          <button onClick={()=>{setStatsRound(scorecardRound);setView("stats");}} style={{flex:1,...ghost,borderRadius:12,padding:"11px",fontSize:13}}>View Stats</button>
          <GreenBtn onClick={()=>setView("home")} style={{flex:2}}>Done</GreenBtn>
        </div>
        <BottomNav view={view} setView={setView} setStatsRound={setStatsRound}/>
      </Screen>
    );
  }

  // ── STATS ─────────────────────────────────────────────────────────────────
  if (view==="stats") {
    const isRound=!!statsRound;
    const rStats =isRound?analyzeRound(statsRound):null;
    const allSt  =rounds.length?aggregateAll(rounds):null;
    const data   =isRound?rStats:allSt;
    const tier   =isRound?hcpTier(statsRound.handicap||18):"mid";

    return (
      <Screen>
        <div style={{padding:"18px 20px 0",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setView("home")} style={{...ghost,padding:"6px 12px",borderRadius:8,fontSize:12}}>← Home</button>
          <div style={{flex:1}}/>
          {rounds.length>0&&<button onClick={()=>setView("history")} style={{...ghost,padding:"6px 12px",borderRadius:8,fontSize:12}}>History</button>}
        </div>

        {rounds.length>0&&(
          <div style={{padding:"10px 20px 0",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>
            <TB label="All Time" active={!statsRound} onClick={()=>setStatsRound(null)} small/>
            {rounds.slice(0,4).map((r,i)=><TB key={i} label={r.courseName||("Round "+(rounds.length-i))} active={statsRound===r} onClick={()=>setStatsRound(r)} small/>)}
          </div>
        )}

        {!data&&<EmptyState onAction={()=>setView("home")}/>}

        {data&&(
          <>
            {isRound&&(
              <div style={{padding:"12px 20px 0"}}>
                <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:20,color:"#f0ebe0"}}>{statsRound.courseName}</div>
                <div style={{fontSize:11,color:"#3a5042",marginBottom:2}}>
                  {new Date(statsRound.date).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
                  {statsRound.teeBox&&(" · "+statsRound.teeBox+" tee")}
                  {statsRound.handicap&&(" · HCP "+statsRound.handicap)}
                  {statsRound.weather&&statsRound.weather.length>0&&(" · "+statsRound.weather.map(function(w){var o=WEATHER_OPT.find(function(x){return x.k===w;});return o?o.l:w;}).join(", "))}
                </div>
                <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                  {[
                    {l:"Score",v:rStats.totalScore,sub:"Par "+rStats.totalPar},
                    {l:"vs Par",v:rStats.diff===0?"E":rStats.diff>0?"+"+rStats.diff:rStats.diff,col:rStats.diff<0?"#5abf80":rStats.diff===0?"#a0b8a8":rStats.diff<5?"#c8a84a":"#e05050"},
                    {l:"Putts",v:rStats.putts},
                    {l:"GIR",v:rStats.gir+"%"},
                    {l:"FIR",v:rStats.fir+"%"},
                  ].map(m=>(
                    <div key={m.l} style={{flex:1,minWidth:52,background:"#0c1a12",borderRadius:10,padding:"8px 4px",textAlign:"center",border:"1px solid #1a2a1f"}}>
                      <div style={{fontSize:8,color:"#3a5042",textTransform:"uppercase",letterSpacing:1}}>{m.l}</div>
                      <div style={{fontSize:17,fontWeight:800,color:m.col||"#f0ebe0"}}>{m.v}</div>
                      {m.sub&&<div style={{fontSize:8,color:"#2a4030"}}>{m.sub}</div>}
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#2a4030",marginTop:6}}>
                  Benchmark: {tierLabel[tier]}
                </div>
              </div>
            )}

            <div style={{display:"flex",padding:"12px 20px 0",gap:8}}>
              {[{k:"sg",l:"Strokes Gained"},{k:"scoring",l:"Scoring"},{k:"putting",l:"Putting"}].map(t=>(
                <button key={t.k} onClick={()=>setStatsTab(t.k)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,transition:"all .1s",background:statsTab===t.k?"#1a5c3a":"#0c1a12",borderColor:statsTab===t.k?"#2d8f5e":"#1a2a1f",color:statsTab===t.k?"#f0ebe0":"#3a5042"}}>{t.l}</button>
              ))}
            </div>

            <div style={{flex:1,overflow:"auto",padding:"14px 20px 110px"}}>
              {statsTab==="sg"&&<SGTab data={data} isRound={isRound} tier={tier} rStats={rStats} allSt={allSt}/>}
              {statsTab==="scoring"&&<ScoringTab data={data} isRound={isRound} statsRound={statsRound} rStats={rStats} allSt={allSt}/>}
              {statsTab==="putting"&&<PuttingTab data={data} isRound={isRound} rStats={rStats} allSt={allSt}/>}
            </div>
          </>
        )}
        <BottomNav view={view} setView={setView} setStatsRound={setStatsRound}/>
      </Screen>
    );
  }

  // ── HISTORY ───────────────────────────────────────────────────────────────
  if (view==="history") return (
    <Screen>
      <div style={{padding:"22px 20px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:22,color:"#f0ebe0"}}>Round History</div>
        {rounds.length>0&&<button onClick={()=>downloadCSV(allRoundsToCSV(rounds),"golf-rounds.csv")} style={{...ghost,borderRadius:8,padding:"7px 12px",fontSize:11,color:"#5abf80",borderColor:"#1a3a28"}}>&#8595; Export CSV</button>}
      </div>
      <div style={{flex:1,overflow:"auto",padding:"0 20px 110px"}}>
        {confirmDeleteIdx!==null&&(
        <div style={{position:"fixed",inset:0,background:"#000b",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#0c1a12",border:"1px solid #1a2a1f",borderRadius:20,padding:28,maxWidth:320,width:"100%"}}>
            <div style={{fontSize:28,textAlign:"center",marginBottom:8}}>🗑️</div>
            <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:18,color:"#f0ebe0",textAlign:"center",marginBottom:8}}>Delete Round?</div>
            <div style={{fontSize:13,color:"#4a6a52",textAlign:"center",marginBottom:24,lineHeight:1.5}}>
              {rounds[confirmDeleteIdx]&&("Delete "+rounds[confirmDeleteIdx].courseName+" on "+(rounds[confirmDeleteIdx].roundDate||rounds[confirmDeleteIdx].date&&rounds[confirmDeleteIdx].date.split("T")[0]||"")+"? This cannot be undone.")}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDeleteIdx(null)} style={{flex:1,...ghost,borderRadius:12,padding:"11px",fontWeight:700}}>Cancel</button>
              <button onClick={()=>{deleteRound(confirmDeleteIdx);setConfirmDeleteIdx(null);}} style={{flex:1,background:"#8f2020",color:"#f0ebe0",border:"none",borderRadius:12,padding:"11px",fontWeight:800,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Delete</button>
            </div>
          </div>
        </div>
      )}
      {rounds.length===0&&<EmptyState onAction={()=>setView("home")}/>}
        {rounds.map((r,i)=>{
          const s=analyzeRound(r);
          return (
            <div key={i} style={{background:"#0c1a12",borderRadius:14,padding:"14px",marginBottom:10,border:"1px solid #1a2a1f"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>{setStatsRound(r);setView("stats");}}>
                  <RoundRow round={r}/>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>downloadCSV(roundToCSV(r),(r.courseName||"round").replace(/\s+/g,"-")+".csv")} style={{...ghost,borderRadius:8,padding:"6px 10px",fontSize:11,color:"#5abf80",borderColor:"#1a3a28"}}>&#8595;</button>
                  <button onClick={()=>{setEditRoundIdx(i);setEditHoleIdx(0);setView("editRound");}} style={{...ghost,borderRadius:8,padding:"6px 10px",fontSize:11}}>Edit</button>
                  <button onClick={()=>setConfirmDeleteIdx(i)} style={{background:"none",border:"none",color:"#5c2020",cursor:"pointer",fontSize:18,padding:"4px"}}>🗑️</button>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"#3a5042"}}>GIR {s.gir}%</span>
                <span style={{fontSize:11,color:"#3a5042"}}>{s.putts} putts</span>
                <span style={{fontSize:11,color:s.sg.total>=0?"#5abf80":"#e05050"}}>SG {s.sg.total>=0?"+":""}{s.sg.total}</span>
                {r.teeBox&&<span style={{fontSize:11,color:TEE_COLORS[r.teeBox]||"#3a5042"}}>● {r.teeBox}</span>}
              </div>
            </div>
          );
        })}
      </div>
      <BottomNav view={view} setView={setView} setStatsRound={setStatsRound}/>
    </Screen>
  );

  // ── EDIT ROUND ─────────────────────────────────────────────────────────────
  if (view==="editRound"&&editRoundIdx!=null) {
    const er=rounds[editRoundIdx];
    if (!er) { setView("history"); return null; }
    const eh=er.holes[editHoleIdx||0];
    return (
      <Screen>
        <div style={{background:"#0c1a12",borderBottom:"1px solid #1a2a1f",padding:"12px 18px",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setView("history")} style={{...ghost,padding:"6px 12px",borderRadius:8,fontSize:12}}>← Back</button>
          <div style={{flex:1,fontFamily:"'Playfair Display',Georgia",fontSize:18,color:"#f0ebe0",textAlign:"center"}}>Edit Scorecard</div>
          <div style={{width:60}}/>
        </div>

        {/* Hole selector */}
        <div style={{padding:"8px 16px",display:"flex",gap:3,flexWrap:"wrap",background:"#0a1410",borderBottom:"1px solid #1a2a1f"}}>
          {er.holes.map((h,i)=>{
            const sc=h.shots.length,d=sc-h.par;
            const bg=sc===0?"#0e1c13":d<=-2?"#5c4a00":d===-1?"#1a5c3a":d===0?"#152a1e":d===1?"#4a3800":"#5c1a1a";
            return <div key={i} onClick={()=>setEditHoleIdx(i)} style={{width:26,height:26,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,cursor:"pointer",background:bg,color:sc===0?"#2a4030":"#f0ebe0",border:i===(editHoleIdx||0)?"2px solid #5abf80":"2px solid transparent"}}>{i+1}</div>;
          })}
        </div>

        <div style={{flex:1,overflow:"auto",padding:"14px 18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:12,color:"#4a6a52"}}>Hole {(editHoleIdx||0)+1} · Par</span>
            {[3,4,5].map(p=>(
              <button key={p} onClick={()=>updateEditRoundHole(editHoleIdx||0,p)} style={{padding:"6px 12px",borderRadius:99,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",background:(er.holes[editHoleIdx||0]&&er.holes[editHoleIdx||0].par===p)?"#1a5c3a":"#0e1c13",color:(er.holes[editHoleIdx||0]&&er.holes[editHoleIdx||0].par===p)?"#f0ebe0":"#3a5042"}}>{p}</button>
            ))}
          </div>

          <SL>Shots on Hole {(editHoleIdx||0)+1}</SL>
          {eh.shots.length===0&&<div style={{color:"#2a4030",fontSize:12,marginBottom:12}}>No shots recorded.</div>}
          {eh.shots.map((s,si)=>(
            <div key={si} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:"#0c1a12",borderRadius:10,marginBottom:6,border:"1px solid #1a2a1f"}}>
              <span style={{fontSize:16,minWidth:22}}>{LIE_IC[s.lie]||"⚪"}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:"#e8e2d0"}}>{s.club}<span style={{color:"#3a5042",fontWeight:400}}> · {s.lie}</span></div>
                {s.distance&&<div style={{fontSize:11,color:"#2a4030"}}>{s.distance}m</div>}
              </div>
              <button onClick={()=>deleteEditShot(editHoleIdx||0,si)} style={{background:"none",border:"none",color:"#7a2a2a",cursor:"pointer",fontSize:16}}>×</button>
            </div>
          ))}

          {/* Add shot to edit */}
          <Card style={{marginTop:12}}>
            <SL>Add Shot</SL>
            <div style={{marginBottom:10}}>
              <FL>Distance (m)</FL>
              <input value={addDist} onChange={e=>setAddDist(e.target.value)} type="number" placeholder="e.g. 120"
                style={{width:"100%",background:"#0a1410",border:"1px solid #1a2a1f",borderRadius:10,padding:"9px 12px",color:"#f0ebe0",fontSize:15,fontFamily:"inherit",boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:10}}>
              <FL>Position</FL>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {LIES.map(l=><TB key={l} label={LIE_IC[l]+" "+l} active={addLie===l} onClick={()=>setAddLie(l)}/>)}
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <FL>Club</FL>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {CLUBS.map(c=><TB key={c} label={c} active={addClub===c} onClick={()=>setAddClub(c)}/>)}
              </div>
            </div>
            <GreenBtn onClick={()=>{ addEditShot(editHoleIdx||0,{club:addClub,lie:addLie,distance:addDist?Number(addDist):null,ts:Date.now()}); setAddDist(""); }}>+ Add Shot</GreenBtn>
          </Card>
        </div>
      </Screen>
    );
  }

  return null;
}

// ─── STATS SUB-COMPONENTS ─────────────────────────────────────────────────────
function SGTab({data,isRound,tier,rStats,allSt}) {
  return (
    <>
      <Card>
        <SL>Strokes Gained vs {tierLabel[tier]} Benchmark</SL>
        <div style={{fontSize:10,color:"#2a4030",marginBottom:14,lineHeight:1.5}}>
          Each shot: SG = expected strokes (before) − expected strokes (after) − 1. Positive = better than benchmark.
        </div>
        {[
          {k:"total",   l:"SG: Total",         icon:"📊"},
          {k:"driving", l:"SG: Off the Tee",   icon:"🏌️"},
          {k:"approach",l:"SG: Approach",      icon:"🎯"},
          {k:"atg",     l:"SG: Around Green",  icon:"🌿"},
          {k:"putting", l:"SG: Putting",       icon:"⛳"},
        ].map(({k,l,icon})=>{
          const val=data.sg[k], isPos=val>=0;
          const barW=Math.min(Math.abs(val)/3*100,100);
          return (
            <div key={k} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{fontSize:12,color:"#c8c0a8"}}>{icon} {l}</span>
                <span style={{fontSize:17,fontWeight:800,color:isPos&&val>0?"#5abf80":val===0?"#555":"#e05050"}}>
                  {(isPos&&val>0?"+":"")+String(val)}
                </span>
              </div>
              <div style={{height:7,background:"#0a1410",borderRadius:99,position:"relative",overflow:"visible"}}>
                <div style={{position:"absolute",left:"50%",top:0,width:1,height:7,background:"#1a3a28",zIndex:1}}/>
                <div style={{position:"absolute",height:7,borderRadius:99,background:isPos?"linear-gradient(90deg,#1a5c3a,#5abf80)":"linear-gradient(90deg,#e05050,#8f2020)",left:isPos?"50%":"calc(50% - "+(barW/2)+"%)",width:(barW/2)+"%",transition:"width .5s",opacity:.9}}/>
              </div>
            </div>
          );
        })}
        <div style={{marginTop:6,padding:"10px 14px",background:"#0a1410",borderRadius:10,fontSize:11,color:"#3a5042",lineHeight:1.6}}>
          {(()=>{
            const sg=data.sg;
            const cats={driving:sg.driving,approach:sg.approach,atg:sg.atg,putting:sg.putting};
            const [wk,wv]=Object.entries(cats).sort((a,b)=>a[1]-b[1])[0];
            const [bk,bv]=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
            const n={driving:"off the tee",approach:"on approaches",atg:"around the green",putting:"putting"};
            return "💡 Losing most shots "+n[wk]+" ("+(wv>=0?"+":"")+wv+"). Strongest area: "+n[bk]+" ("+(bv>=0?"+":"")+bv+").";
          })()}
        </div>
      </Card>

      <Card>
        <SL>Key Metrics</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[
            {l:"GIR %",          v:data.gir+"%",         sub:isRound?(rStats.girCount+"/"+rStats.girHoles+" holes"):undefined},
            {l:"Fairways Hit %", v:data.fir+"%",         sub:isRound?(rStats.firCount+"/"+rStats.firHoles+" par 4/5"):undefined},
            {l:"Putts / Hole",   v:data.puttsPerHole},
            {l:"Putts / GIR",    v:data.puttsPerGIR||"—"},
          ].map(m=>(
            <div key={m.l} style={{background:"#0a1410",borderRadius:12,padding:"12px",border:"1px solid #1a2a1f"}}>
              <div style={{fontSize:9,color:"#3a5042",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{m.l}</div>
              <div style={{fontSize:22,fontWeight:800,color:"#f0ebe0"}}>{m.v}</div>
              {m.sub&&<div style={{fontSize:9,color:"#2a4030",marginTop:2}}>{m.sub}</div>}
            </div>
          ))}
        </div>
      </Card>
    </>
  );
}

function ScoringTab({data,isRound,statsRound,rStats,allSt}) {
  const sdKeys=[
    {l:"Eagle or better",k:"eagle",col:"#c8a84a",icon:"🦅"},
    {l:"Birdie",k:"birdie",col:"#5abf80",icon:"🐦"},
    {l:"Par",k:"par",col:"#a0b8a8",icon:"⬜"},
    {l:"Bogey",k:"bogey",col:"#c8a84a",icon:"🟡"},
    {l:"Double or worse",k:"double",col:"#e05050",icon:"🔴"},
  ];
  return (
    <>
      <Card>
        <SL>Score Distribution</SL>
        {sdKeys.map(({l,k,col,icon})=>{
          const count=isRound?(rStats.scoreDist[k]||0):(allSt.sdTotals[k]||0);
          const total=isRound?rStats.holesPlayed:allSt.totalHoles;
          const pct=total?+(count/total*100).toFixed(1):0;
          return (
            <div key={k} style={{marginBottom:13}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,color:"#c8c0a8"}}>{icon} {l}</span>
                <span style={{fontSize:13,fontWeight:700,color:col}}>{count}<span style={{fontSize:10,color:"#3a5042",marginLeft:4}}>({pct}%)</span></span>
              </div>
              <div style={{height:6,background:"#0a1410",borderRadius:99,overflow:"hidden"}}>
                <div style={{width:Math.min(pct,100)+"%",background:col,height:"100%",borderRadius:99,opacity:.85,transition:"width .5s"}}/>
              </div>
            </div>
          );
        })}
      </Card>

      <Card>
        <SL>Average by Par</SL>
        {[3,4,5].map(p=>{
          const avg=isRound
            ?(rStats.parCounts[p]&&rStats.parCounts[p].length?(rStats.parCounts[p].reduce(function(s,v){return s+v;},0)/rStats.parCounts[p].length).toFixed(2):null)
            :allSt.parAverages[p];
          const count=isRound?((rStats.parCounts[p]&&rStats.parCounts[p].length)||0):null;
          const diff=avg?+(avg-p).toFixed(2):null;
          if (!avg) return null;
          return (
            <div key={p} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid #0a1410"}}>
              <div>
                <div style={{fontSize:13,color:"#c8c0a8",fontWeight:600}}>Par {p}s</div>
                {count!=null&&<div style={{fontSize:10,color:"#2a4030"}}>{count} hole{count===1?"":"s"}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontSize:22,fontWeight:800,color:"#f0ebe0"}}>{avg}</span>
                <span style={{fontSize:12,marginLeft:8,fontWeight:700,color:diff<0?"#5abf80":diff<=0.75?"#a0b8a8":diff<=1.25?"#c8a84a":"#e05050"}}>
                  ({diff>=0?"+":""}{diff})
                </span>
              </div>
            </div>
          );
        })}
      </Card>

      {isRound&&(
        <Card>
          <SL>Hole by Hole</SL>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {statsRound.holes.map((h,i)=>{
              const d=h.shots.length-h.par,sc=h.shots.length;
              const bg=sc===0?"#0a1410":d<=-2?"#5c4a00":d===-1?"#1a5c3a":d===0?"#152a1e":d===1?"#4a3800":"#5c1a1a";
              return (
                <div key={i} style={{width:42,background:bg,borderRadius:8,padding:"5px 0",textAlign:"center",border:"1px solid #1a2a1f"}}>
                  <div style={{fontSize:8,color:"#3a5042"}}>H{i+1}/P{h.par}</div>
                  <div style={{fontSize:17,fontWeight:800,color:sc===0?"#2a4030":"#f0ebe0"}}>{sc||"—"}</div>
                  <div style={{fontSize:8,color:d<0?"#5abf80":d===0?"#3a5042":d===1?"#c8a84a":"#e05050"}}>{sc===0?"":d===0?"E":d>0?"+"+d:d}</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </>
  );
}

function PuttingTab({data,isRound,rStats,allSt}) {
  return (
    <>
      <Card>
        <SL>Putting Summary</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[
            {l:"Total Putts",  v:isRound?rStats.putts:((+data.puttsPerHole*18).toFixed(0)+" avg/18")},
            {l:"Putts / Hole", v:data.puttsPerHole},
            {l:"Putts / GIR",  v:data.puttsPerGIR||"—"},
            {l:"SG: Putting",  v:data.sg.putting>=0?"+"+data.sg.putting:""+data.sg.putting,col:data.sg.putting>=0?"#5abf80":"#e05050"},
          ].map(m=>(
            <div key={m.l} style={{background:"#0a1410",borderRadius:12,padding:"12px",border:"1px solid #1a2a1f"}}>
              <div style={{fontSize:9,color:"#3a5042",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{m.l}</div>
              <div style={{fontSize:20,fontWeight:800,color:m.col||"#f0ebe0"}}>{m.v}</div>
            </div>
          ))}
        </div>
      </Card>

      {!isRound&&allSt.puttBuckets.some(b=>b.attempts>0)&&(
        <Card>
          <SL>Make % by Distance</SL>
          <div style={{fontSize:10,color:"#2a4030",marginBottom:12,lineHeight:1.5}}>Your conversion vs your handicap benchmark (grey marker).</div>
          {allSt.puttBuckets.map(b=>{
            if (!b.attempts) return null;
            const col=b.pct>=b.benchPct?"#5abf80":b.pct>=b.benchPct*0.8?"#c8a84a":"#e05050";
            return (
              <div key={b.label} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#c8c0a8",fontWeight:600}}>{b.label}</span>
                  <div>
                    <span style={{fontSize:16,fontWeight:800,color:col}}>{b.pct}%</span>
                    <span style={{fontSize:10,color:"#3a5042",marginLeft:6}}>{b.made}/{b.attempts}</span>
                  </div>
                </div>
                <div style={{position:"relative",height:7,background:"#0a1410",borderRadius:99,overflow:"hidden"}}>
                  <div style={{position:"absolute",left:b.benchPct+"%",top:0,width:2,height:7,background:"#2a4030",zIndex:2,borderRadius:99}}/>
                  <div style={{width:Math.min(b.pct,100)+"%",background:col,height:"100%",borderRadius:99,transition:"width .5s",opacity:.9}}/>
                </div>
                <div style={{fontSize:9,color:"#2a4030",textAlign:"right",marginTop:2}}>benchmark {b.benchPct}%</div>
              </div>
            );
          })}
        </Card>
      )}

      {isRound&&rStats.puttDists.length>0&&(
        <Card>
          <SL>Putts This Round</SL>
          {rStats.puttDists.map((p,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:"1px solid #0a1410"}}>
              <div style={{width:34,height:34,borderRadius:10,background:p.made?"#0e2a1a":"#1a0e0e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{p.made?"✅":"❌"}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:"#e8e2d0"}}>{p.dist}m</div>
                <div style={{fontSize:11,color:"#3a5042"}}>{p.made?"One-putt 🎯":"Two-putt or more"}</div>
              </div>
            </div>
          ))}
        </Card>
      )}

      {isRound&&rStats.puttDists.length===0&&(
        <Card><div style={{color:"#3a5042",fontSize:13,textAlign:"center",padding:"12px 0"}}>Log distance when on the Green to track putting performance.</div></Card>
      )}
    </>
  );
}

// ─── NEW ROUND FORM ──────────────────────────────────────────────────────────
function NewRoundForm({courses,onStart}) {
  const today=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  const [courseName, setCourseName] = useState("");
  const [showCourses,setShowCourses]= useState(false);
  const [teeBox,     setTeeBox]     = useState("White");
  const [weather,    setWeather]    = useState([]);
  const [handicap,   setHandicap]   = useState("18");
  const todayStr = new Date().toISOString().split("T")[0];
  const [roundDate,  setRoundDate]  = useState(todayStr);
  const [holes,      setHoles]      = useState(18);
  const [holePars,   setHolePars]   = useState(Array(18).fill(4));
  const [step,       setStep]       = useState(1); // 1=info, 2=pars

  const selectCourse=(c)=>{
    setCourseName(c.name);
    const pars=c.holes&&c.holes.length>=9?c.holes:Array(holes).fill(4);
    setHolePars(pars.slice(0,holes));
    setShowCourses(false);
  };

  const toggleWeather=w=>setWeather(prev=>prev.includes(w)?prev.filter(x=>x!==w):[...prev,w]);

  const setPar=(idx,val)=>setHolePars(prev=>{const n=[...prev];n[idx]=val;return n;});

  const handleHolesChange=(h)=>{
    setHoles(h);
    setHolePars(prev=>h===18?[...prev,...Array(18-prev.length).fill(4)].slice(0,18):prev.slice(0,9));
  };

  const handleStart=()=>{
    const name=courseName.trim()||("Round – "+today);
    onStart({courseName:name,teeBox,weather,handicap:Number(handicap)||18,holePars:holePars.slice(0,holes),roundDate});
  };

  if (step===2) return (
    <div>
      <div style={{fontFamily:"'Playfair Display',Georgia",fontSize:15,color:"#f0ebe0",marginBottom:10}}>Set hole pars — {courseName}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {holePars.slice(0,holes).map((p,i)=>(
          <div key={i} style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#3a5042",marginBottom:2}}>H{i+1}</div>
            <div style={{display:"flex",flexDirection:"column",gap:2}}>
              {[3,4,5].map(pv=>(
                <button key={pv} onClick={()=>setPar(i,pv)} style={{width:30,padding:"3px 0",borderRadius:5,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,background:p===pv?"#1a5c3a":"#0e1c13",color:p===pv?"#f0ebe0":"#3a5042"}}>{pv}</button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setStep(1)} style={{flex:1,...ghost,borderRadius:12,padding:"11px"}}>← Back</button>
        <GreenBtn onClick={handleStart} style={{flex:2}}>🏌️ Tee Off!</GreenBtn>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Course name */}
      <div style={{position:"relative"}}>
        <FL>Course name</FL>
        <input value={courseName} onChange={e=>{setCourseName(e.target.value);setShowCourses(e.target.value.length>0||courses.length>0);}}
          onFocus={()=>setShowCourses(true)}
          placeholder={"Round – "+today}
          style={{width:"100%",background:"#0a1410",border:"1px solid #1a2a1f",borderRadius:10,padding:"10px 14px",color:"#f0ebe0",fontSize:14,fontFamily:"inherit",boxSizing:"border-box"}}/>
        {showCourses&&courses.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#0c1a12",border:"1px solid #1a2a1f",borderRadius:10,zIndex:10,maxHeight:160,overflow:"auto",marginTop:2}}>
            {courses.filter(c=>c.name.toLowerCase().includes(courseName.toLowerCase())).slice(0,8).map((c,i)=>(
              <div key={i} onClick={()=>selectCourse(c)} style={{padding:"10px 14px",cursor:"pointer",fontSize:13,color:"#c8c0a8",borderBottom:"1px solid #1a2a1f"}}>
                ⛳ {c.name} <span style={{color:"#3a5042",fontSize:10}}>({(c.holes&&c.holes.length)||"?"}h)</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Holes */}
      <div style={{display:"flex",gap:8}}>
        {[9,18].map(h=>(
          <button key={h} onClick={()=>handleHolesChange(h)} style={{flex:1,padding:"9px",borderRadius:10,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,background:holes===h?"#1a5c3a":"#0a1410",borderColor:holes===h?"#2d8f5e":"#1a2a1f",color:holes===h?"#f0ebe0":"#3a5042"}}>{h} Holes</button>
        ))}
      </div>

      {/* Date */}
      <div>
        <FL>Date</FL>
        <input value={roundDate} onChange={e=>setRoundDate(e.target.value)} type="date"
          style={{width:"100%",background:"#0a1410",border:"1px solid #1a2a1f",borderRadius:10,padding:"11px 14px",color:"#f0ebe0",fontSize:15,fontFamily:"inherit",boxSizing:"border-box",colorScheme:"dark"}}/>
      </div>

      {/* Handicap */}
      <div>
        <FL>Playing handicap (0–36)</FL>
        <input value={handicap} onChange={e=>setHandicap(e.target.value)} type="number" min="0" max="36"
          inputMode="numeric" pattern="[0-9]*" placeholder="e.g. 18"
          style={{width:"100%",background:"#0a1410",border:"1px solid #1a2a1f",borderRadius:10,padding:"11px 14px",color:"#f0ebe0",fontSize:16,fontFamily:"inherit",boxSizing:"border-box"}}/>
        {Boolean(handicap)&&<div style={{fontSize:9,color:"#2a4030",marginTop:4}}>Benchmark: {tierLabel[hcpTier(Number(handicap)||0)]}</div>}
      </div>

      {/* Tee box */}
      <div>
        <FL>Tee box</FL>
        <div style={{display:"flex",gap:6}}>
          {TEE_BOXES.map(t=>(
            <button key={t} onClick={()=>setTeeBox(t)} style={{flex:1,padding:"7px 4px",borderRadius:10,border:"2px solid",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,transition:"all .1s",background:teeBox===t?TEE_COLORS[t]+"33":"#0a1410",borderColor:teeBox===t?TEE_COLORS[t]:"#1a2a1f",color:teeBox===t?"#f0ebe0":"#3a5042"}}>
              <span style={{display:"block",width:10,height:10,borderRadius:"50%",background:TEE_COLORS[t],margin:"0 auto 3px"}}/>
              {t}
            </button>
          ))}
        </div>
      </div>

      {/* Weather */}
      <div>
        <FL>Weather (select all that apply)</FL>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {WEATHER_OPT.map(w=>(
            <button key={w.k} onClick={()=>toggleWeather(w.k)} style={{padding:"6px 12px",borderRadius:99,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,background:weather.includes(w.k)?"#1a3a2a":"#0a1410",borderColor:weather.includes(w.k)?"#2d8f5e":"#1a2a1f",color:weather.includes(w.k)?"#f0ebe0":"#3a5042"}}>{w.l}</button>
          ))}
        </div>
      </div>

      <GreenBtn onClick={()=>setStep(2)}>Set Hole Pars →</GreenBtn>
    </div>
  );
}


// ─── EXPORT ─────────────────────────────────────────────────────────────────
function esc(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"';}
function rowToCSV(arr){return arr.map(esc).join(",");}

function roundToCSV(round){
  var s=analyzeRound(round),diff=s.diff===0?"E":(s.diff>0?"+":"")+s.diff;
  var dStr=round.roundDate||(round.date?round.date.split("T")[0]:"");
  var rows=[];
  rows.push(rowToCSV(["Golf Tracker - Round Export"]));
  rows.push(rowToCSV(["Course",round.courseName||"","Date",dStr,"Handicap",round.handicap||"","Tee",round.teeBox||""]));
  rows.push(rowToCSV(["Score",s.totalScore,"Par",s.totalPar,"vs Par",diff,"Putts",s.putts]));
  rows.push(rowToCSV(["GIR%",s.gir+"%","FIR%",s.fir+"%","Putts/Hole",s.puttsPerHole,"Putts/GIR",s.puttsPerGIR||"-"]));
  rows.push(rowToCSV(["SG Total",s.sg.total,"SG Drive",s.sg.driving,"SG Approach",s.sg.approach,"SG ATG",s.sg.atg,"SG Putting",s.sg.putting]));
  rows.push("");
  rows.push(rowToCSV(["Hole","Par","Score","vs Par","Putts","GIR","FIR"]));
  round.holes.forEach(function(h){
    if(!h.shots.length)return;
    var sc=h.shots.length,d=sc-h.par;
    var putts=h.shots.filter(function(s){return s.lie==="Green";}).length;
    var gir=h.shots.slice(0,h.par-1).some(function(s){return s.lie==="Green";})?"Y":"N";
    var fir=h.par>=4&&h.shots.length>1&&h.shots[1].lie==="Fairway"?"Y":(h.par>=4?"N":"-");
    rows.push(rowToCSV([h.hole,h.par,sc,d===0?"E":(d>0?"+":"")+d,putts,gir,fir]));
  });
  rows.push("");
  rows.push(rowToCSV(["Hole","Shot","Club","Lie","Distance(m)"]));
  round.holes.forEach(function(h){
    h.shots.forEach(function(sh,i){rows.push(rowToCSV([h.hole,i+1,sh.club,sh.lie,sh.distance||""]));});
  });
  return rows.join("\n");
}

function allRoundsToCSV(rounds){
  var header=rowToCSV(["Course","Date","Handicap","Tee","Holes","Score","Par","vs Par","GIR%","FIR%","Putts","Putts/Hole","Putts/GIR","SG Total","SG Drive","SG Approach","SG ATG","SG Putting"]);
  var rows=rounds.map(function(r){
    var s=analyzeRound(r),diff=s.diff===0?"E":(s.diff>0?"+":"")+s.diff;
    var dStr=r.roundDate||(r.date?r.date.split("T")[0]:"");
    return rowToCSV([r.courseName||"",dStr,r.handicap||"",r.teeBox||"",r.total,s.totalScore,s.totalPar,diff,s.gir+"%",s.fir+"%",s.putts,s.puttsPerHole,s.puttsPerGIR||"-",s.sg.total,s.sg.driving,s.sg.approach,s.sg.atg,s.sg.putting]);
  });
  return [header].concat(rows).join("\n");
}

function downloadCSV(csv,filename){
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function Screen({children}) {
  return (
    <div style={{background:"#080f0a",minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',system-ui,sans-serif",color:"#e8e2d0"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        input{outline:none;}
        input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-track{background:#080f0a;}
        ::-webkit-scrollbar-thumb{background:#1a5c3a;border-radius:99px;}

}
function Loader(){return <div style={{background:"#080f0a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#1a5c3a",fontSize:36}}>⛳</div>;}
function AppHeader(){return <div style={{padding:"26px 20px 8px",display:"flex",alignItems:"center",gap:14}}><div style={{width:46,height:46,borderRadius:14,background:"linear-gradient(135deg,#1a5c3a,#2d8f5e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 4px 20px #1a5c3a55"}}>⛳</div><div><div style={{fontFamily:"'Playfair Display',Georgia",fontSize:22,color:"#f0ebe0",lineHeight:1}}>Golf Tracker</div><div style={{fontSize:9,color:"#2a4030",letterSpacing:2.5,textTransform:"uppercase",marginTop:2}}>Strokes Gained · Analytics</div></div></div>;}
function Card({children,style={}}){return <div style={{background:"#0c1a12",border:"1px solid #1a2a1f",borderRadius:16,padding:"16px",marginBottom:14,...style}}>{children}</div>;}
function SL({children}){return <div style={{fontSize:9,color:"#2a4030",textTransform:"uppercase",letterSpacing:2.5,marginBottom:10,fontWeight:700}}>{children}</div>;}
function FL({children}){return <div style={{fontSize:10,color:"#3a5042",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{children}</div>;}
function GreenBtn({onClick,children,style={}}){return <button onClick={onClick} style={{width:"100%",background:"linear-gradient(135deg,#1a5c3a,#2d8f5e)",color:"#f0ebe0",border:"none",borderRadius:12,padding:"13px",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 20px #1a5c3a55",...style}}>{children}</button>;}
const ghost={background:"#0c1a12",color:"#4a6a52",border:"1px solid #1a2a1f",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13};
function TB({label,active,onClick,small}){return <button onClick={onClick} style={{padding:small?"5px 10px":"6px 11px",borderRadius:99,border:"1px solid",cursor:"pointer",fontSize:small?11:12,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap",background:active?"#1a5c3a":"#0c1a12",borderColor:active?"#2d8f5e":"#1a2a1f",color:active?"#f0ebe0":"#3a5042",boxShadow:active?"0 2px 10px #1a5c3a55":"none"}}>{label}</button>;}
function ActionTile({icon,label,sub,onClick}){return <button onClick={onClick} style={{background:"#0c1a12",border:"1px solid #1a2a1f",borderRadius:16,padding:"20px 16px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",width:"100%"}}><div style={{fontSize:26,marginBottom:8}}>{icon}</div><div style={{fontSize:15,fontWeight:800,color:"#f0ebe0"}}>{label}</div><div style={{fontSize:11,color:"#2a4030"}}>{sub}</div></button>;}
function RoundRow({round,onClick}){const s=analyzeRound(round),d=s.diff;return <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,cursor:onClick?"pointer":"default"}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#e8e2d0"}}>{round.courseName||"Round"}</div><div style={{fontSize:11,color:"#2a4030"}}>{new Date(round.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})} · {round.total}h · {s.putts} putts · GIR {s.gir}%{round.teeBox?" · "+round.teeBox:""}</div></div><div style={{fontSize:20,fontWeight:800,color:d<0?"#5abf80":d===0?"#a0b8a8":d<5?"#c8a84a":"#e05050"}}>{d===0?"E":d>0?"+"+d:d}</div></div>;}
function EmptyState({onAction}){return <div style={{textAlign:"center",color:"#2a4030",paddingTop:60,paddingBottom:30}}><div style={{fontSize:52}}>⛳</div><p style={{marginBottom:16}}>No rounds yet.</p><GreenBtn onClick={onAction} style={{width:"auto",padding:"10px 28px"}}>Start First Round</GreenBtn></div>;}
function BottomNav({view,setView,setStatsRound}){const items=[{icon:"🏠",l:"Home",k:"home"},{icon:"📊",l:"Stats",k:"stats"},{icon:"📋",l:"History",k:"history"}];const activeView=view==="scorecard"?"stats":view;return <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,borderTop:"1px solid #1a2a1f",display:"flex",background:"#080f0a"}}>{items.map(it=><button key={it.k} onClick={()=>{if(it.k==="stats")setStatsRound(null);setView(it.k);}} style={{flex:1,padding:"12px 0 10px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:18}}>{it.icon}</span><span style={{fontSize:9,color:activeView===it.k?"#5abf80":"#2a4030",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{it.l}</span></button>)}</div>;}

const container = document.getElementById('root');
document.getElementById('loading').style.display='none';
container.style.display='block';
ReactDOM.createRoot(container).render(React.createElement(GolfTracker));
